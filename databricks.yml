bundle:
  name: job-cluster-monitoring

include:
  - resources/*.yml

# Genie Code Skills live in skills/ and are published to /Workspace/.assistant/skills
# out-of-band via `make skills` (databricks workspace import-dir) — DAB has no skill
# resource type and cannot target that path. Keep them out of the bundle file sync.
sync:
  exclude:
    - "skills/**"

variables:
  catalog:
    description: "Unity Catalog 카탈로그 이름"
    default: "hurcy"
  analytics_schema:
    description: "분석 결과 출력 스키마 (Spill 뷰 + Right-Sizing 테이블)"
    default: "test"
  workspace_id:
    description: "분석 대상 워크스페이스 ID"
    default: "984752964297111"
  warehouse_id:
    description: "대시보드용 SQL Warehouse ID (dev=이름 lookup, 그 외 타겟은 ID 명시)"
  node_type_id:
    description: "잡 클러스터 노드 타입 (클라우드별 상이 — Azure 기본, AWS/GCP는 타겟에서 오버라이드)"
    default: "Standard_D4ds_v5"

targets:
  dev:
    default: true
    mode: development
    workspace:
      host: https://adb-984752964297111.11.azuredatabricks.net
      profile: DEFAULT
    variables:
      warehouse_id:
        lookup:
          warehouse: "Shared Endpoint"

  # AWS e2-demo-field-eng — system.compute.clusters 접근 가능 (Right-Sizing 검증용)
  e2demo:
    mode: development
    workspace:
      host: https://e2-demo-field-eng.cloud.databricks.com
      profile: e2-demo-west
    variables:
      catalog: "main"
      analytics_schema: "cinyoung_hur_monitoring"
      workspace_id: "1444828305810485"
      warehouse_id: "8baced1ff014912d"   # Shared endpoint (lookup 대신 명시)
      node_type_id: "m5d.xlarge"         # AWS (4 vCPU/16GB, 로컬 NVMe SSD)
