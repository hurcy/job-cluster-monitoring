resources:
  pipelines:
    system_table_copies:
      name: "[${bundle.target}] System Table Filtered Copies"
      catalog: ${var.catalog}
      target: ${var.system_copies_schema}
      serverless: true
      channel: CURRENT
      configuration:
        workspace_id: ${var.workspace_id}
      libraries:
        - file:
            path: ../workload_analysis/transformations/system_table_copies_mv.sql
      permissions:
        - level: CAN_VIEW
          group_name: users

    instance_workload_profiles:
      name: "[${bundle.target}] Instance Workload Profiles MV"
      catalog: ${var.catalog}
      target: ${var.analytics_schema}
      serverless: true
      channel: CURRENT
      configuration:
        workspace_id: ${var.workspace_id}
        source_catalog: ${var.catalog}
        source_schema: ${var.system_copies_schema}
        start_date: ${var.start_date}
        end_date: ${var.end_date}
      libraries:
        - file:
            path: ../workload_analysis/transformations/instance_workload_analysis_mv.sql
      permissions:
        - level: CAN_VIEW
          group_name: users
